spring.application.name=Eventify

# Configuración de H2 para que guarde en un archivo (Persistencia Real)
spring.datasource.url=jdbc:h2:file:./data/eventifydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


spring.jpa.hibernate.ddl-auto=none

# CONFIGURACIÓN DE FLYWAY
# Le dice a Flyway que si la base de datos está vacía, cree la tabla de control
spring.flyway.baseline-on-migrate=true
# Habilita Flyway
spring.flyway.enabled=true

# Consola H2 habilitada en /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger UI: Solo documentar los endpoints de la API (excluyendo la UI)
springdoc.paths-to-match=/api/**