<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Evento</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow border-0 rounded-3">

                <div class="card-header bg-primary text-white p-3 text-center">
                    <h2 class="m-0 fw-bold fs-4">Crear Nuevo Evento</h2>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/admin/events/new}" th:object="${event}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Nombre del Evento</label>
                            <input type="text" th:field="*{name}" class="form-control" placeholder="Ej. Conferencia de Desarrolladores" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Fecha</label>
                            <input type="text" th:field="*{date}" class="form-control" placeholder="Ej. 2026-05-28" required />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Descripción</label>
                            <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Escribe los detalles o agenda del evento..."></textarea>
                        </div>

                        <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                            <a href="/admin/events" class="btn btn-outline-secondary">
                                Volver al listado
                            </a>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                Guardar
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
