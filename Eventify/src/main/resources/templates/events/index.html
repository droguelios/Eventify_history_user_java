<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${tituloPantalla}">Panel de Control</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body class="bg-light">

<div class="container mt-5">

    <div class="p-4 mb-4 bg-primary text-white rounded shadow-sm">
        <h1 class="m-0 fw-bold" th:text="${tituloPantalla}">Administración de Eventos - Eventify</h1>
    </div>

    <div th:if="${!events.empty}" class="table-responsive bg-white p-3 rounded shadow-sm mb-4">
        <table class="table table-hover table-striped align-middle">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Descripción</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="event : ${events}">
                <td class="fw-bold" th:text="${event.id}">1</td>
                <td th:text="${event.nameevent}">Evento ejemplo</td>
                <td th:text="${event.date}">2024-01-01</td>
                <td class="text-secondary" th:text="${event.nameplace}">Lugar</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:unless="${!events.empty}" class="alert alert-warning shadow-sm" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>Actualmente no hay eventos programados
    </div>

    <div class="mt-3">
        <a href="/admin/events/new" class="btn btn-primary btn-lg shadow-sm">Crear nuevo evento</a>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
