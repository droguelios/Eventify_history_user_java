<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Crear Sede</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.3/css/bootstrap.min.css}">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card shadow border-0 rounded-3">

                <div class="card-header bg-dark text-success p-3 text-center border-bottom border-success border-2">
                    <h2 class="m-0 fw-bold fs-4">Crear Nueva Sede</h2>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/admin/venues/new}" th:object="${venue}" method="post">

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Lugar / Establecimiento</label>
                            <input type="text" th:field="*{places}" class="form-control" placeholder="Ej. Centro de Convenciones Plaza" required />
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold text-dark">Ciudad</label>
                            <input type="text" th:field="*{city}" class="form-control" placeholder="Ej. Medellín" required />
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold text-dark">Capacidad Máxima</label>
                            <input type="number" th:field="*{capacity}" class="form-control" placeholder="Ej. 500" min="1" required />
                        </div>

                        <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                            <a href="/admin/venues" class="btn btn-outline-secondary">
                                Volver al listado
                            </a>
                            <button type="submit" class="btn btn-success px-4 shadow-sm">
                                Guardar
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/5.3.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
